<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to Blue Collar Demand</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Georgia', serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 600px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #f97316, #ea580c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p { font-size: 1.1rem; color: #999; line-height: 1.7; margin-bottom: 1rem; }
    .highlight { color: #f97316; font-weight: bold; }
    .btn {
      display: inline-block;
      margin-top: 2rem;
      padding: 1rem 2.5rem;
      background: #f97316;
      color: #000;
      font-weight: bold;
      text-decoration: none;
      border-radius: 4px;
      font-size: 1rem;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔧</div>
    <h1>You're In.</h1>
    <p>Welcome to <span class="highlight">Blue Collar Demand</span>. Your payment was successful and your AI Service Coordinator setup is underway.</p>
    <p>Our team will reach out within <span class="highlight">1 business day</span> to kick off your onboarding and get Aurora live for your shop.</p>
    <p style="color: #666; font-size: 0.9rem;">Check your email for your receipt and next steps.</p>
    <a href="https://bluecollardemand.com" class="btn">Back to Home</a>
  </div>
</body>
</html>
